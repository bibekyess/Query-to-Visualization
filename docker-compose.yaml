name: query-to-viz-project

services:
  api:
    build: .
    image: bibekyess/query-to-viz-agent:0.1.0
    ports:
      - "9072:8000"
    env_file:
      - .env
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:v10.5.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9073:8080"
    environment:
      DOZZLE_FILTER: "label=com.docker.compose.project=query-to-viz-project"
      DOZZLE_AUTH_PROVIDER: none
      DOZZLE_BASE: /logs